<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura AI - Studio</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-sidebar: #131318;
            --bg-input: #1c1c24;
            --accent: #f8c02c;
            --text-light: #ffffff;
            --text-muted: #8b8b99;
            --border: #2a2a36;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 10;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="password"],
        input[type="text"],
        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: relative;
        }

        .canvas-container {
            flex: 1;
            background-color: var(--bg-sidebar);
            border: 1px dashed var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
            position: relative;
        }

        .canvas-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 15px;
            text-align: center;
        }

        .prompt-bar {
            display: flex;
            gap: 12px;
            background-color: var(--bg-sidebar);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .prompt-bar input {
            background-color: transparent;
            border: none;
            padding: 8px;
        }

        .loader {
            display: none;
            color: var(--accent);
            font-weight: 600;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .error-toast {
            display: none;
            background-color: #ff4a4a;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            position: absolute;
            top: 24px;
            right: 24px;
            max-width: 400px;
            box-shadow: 0 4px 12px rgba(255, 74, 74, 0.2);
            z-index: 50;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; box-sizing: border-box;}
            .main-content { padding: 16px; }
            .prompt-bar { flex-direction: column; }
            .prompt-bar button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <div style="width: 24px; height: 24px; background: var(--accent); border-radius: 6px;"></div>
            AURA AI
        </div>

        <div class="settings-group">
            <label>API Key</label>
            <input type="password" id="uiApiKey" placeholder="Paste Key here...">
        </div>

        <div class="settings-group">
            <label>Aspect Ratio</label>
            <select id="uiRatio">
                <option value="1:1">Square (1:1)</option>
                <option value="16:9">Widescreen (16:9)</option>
                <option value="9:16">Portrait (9:16)</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div id="errorToast" class="error-toast"></div>

        <div class="canvas-container">
            <div id="placeholderText" class="placeholder-text">Awaiting your vision...</div>
            <div id="loader" class="loader">Channeling Aura...</div>
            <img id="resultImage" alt="Generated Image">
        </div>

        <div class="prompt-bar">
            <input type="text" id="uiPrompt" placeholder="Describe the image you want to generate..." autocomplete="off">
            <button id="btnGenerate">Generate</button>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('uiApiKey');
        const promptInput = document.getElementById('uiPrompt');
        const btnGenerate = document.getElementById('btnGenerate');
        const resultImage = document.getElementById('resultImage');
        const placeholderText = document.getElementById('placeholderText');
        const loader = document.getElementById('loader');
        const errorToast = document.getElementById('errorToast');

        function showError(message) {
            errorToast.textContent = message;
            errorToast.style.display = 'block';
            setTimeout(() => { errorToast.style.display = 'none'; }, 5000);
        }

        async function generateImage() {
            const apiKey = apiKeyInput.value.trim();
            const prompt = promptInput.value.trim();

            if (!apiKey) {
                showError("Please paste your API Key in the sidebar.");
                return;
            }
            if (!prompt) {
                showError("Please enter a prompt.");
                return;
            }

            btnGenerate.disabled = true;
            btnGenerate.textContent = "Generating...";
            placeholderText.style.display = 'none';
            resultImage.style.display = 'none';
            loader.style.display = 'block';
            errorToast.style.display = 'none';

            const endpoint = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=" + apiKey;
            
            const payload = {
                contents: [
                    {
                        parts: [
                            { text: prompt }
                        ]
                    }
                ]
            };

            try {
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "Request rejected.");
                }

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].inlineData) {
                    const base64Image = data.candidates[0].content.parts[0].inlineData.data;
                    const mimeType = data.candidates[0].content.parts[0].inlineData.mimeType || "image/jpeg";
                    
                    resultImage.src = "data:" + mimeType + ";base64," + base64Image;
                    resultImage.style.display = 'block';
                    loader.style.display = 'none';
                } else {
                    throw new Error("Image data was missing from the response.");
                }

            } catch (error) {
                showError(error.message);
                loader.style.display = 'none';
                placeholderText.style.display = 'block';
                placeholderText.textContent = "Generation failed. Try again.";
            } finally {
                btnGenerate.disabled = false;
                btnGenerate.textContent = "Generate";
            }
        }

        btnGenerate.addEventListener('click', generateImage);
        promptInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateImage();
            }
        });
    </script>
</body>
</html>
