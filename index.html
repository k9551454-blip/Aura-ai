<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Image Generation Studio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        aura: {
                            dark: '#0f1115',
                            card: 'rgba(255, 255, 255, 0.03)',
                            border: 'rgba(255, 255, 255, 0.08)',
                            gold: '#d4af37',
                            goldLight: '#f3e5ab'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for a polished look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.6); }

        /* Glassmorphism Utilities */
        .glass-card {
            background: var(--tw-colors-aura-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--tw-colors-aura-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        
        /* Loader Animation */
        .loader {
            border-top-color: #d4af37;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-aura-dark text-white h-screen flex overflow-hidden selection:bg-aura-gold selection:text-black">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/80 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 glass-card border-r border-y-0 border-l-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <!-- Logo -->
        <div class="p-6 flex items-center justify-between border-b border-aura-border">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-aura-gold to-yellow-600 flex items-center justify-center shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                    <i class="fa-solid fa-sparkles text-black text-sm"></i>
                </div>
                <h1 class="text-xl font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-aura-goldLight to-aura-gold">AURA AI</h1>
            </div>
            <button class="lg:hidden text-gray-400 hover:text-white" onclick="toggleSidebar()">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-aura-gold/10 text-aura-gold border border-aura-gold/20 transition-all">
                <i class="fa-solid fa-image w-5"></i>
                <span class="font-medium">Image Generation</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <i class="fa-solid fa-layer-group w-5"></i>
                <span class="font-medium">Personal Models</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <i class="fa-solid fa-compass w-5"></i>
                <span class="font-medium">Community Feed</span>
            </a>
        </nav>

        <!-- User Profile Stub -->
        <div class="p-4 border-t border-aura-border">
            <div class="flex items-center gap-3 px-2 py-2 cursor-pointer hover:bg-white/5 rounded-xl transition-all">
                <img src="https://ui-avatars.com/api/?name=Creator&background=d4af37&color=000" alt="User" class="w-10 h-10 rounded-full border border-aura-gold/50">
                <div>
                    <p class="text-sm font-semibold">Creator Pro</p>
                    <p class="text-xs text-aura-gold">8,420 Tokens</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Topbar -->
        <header class="h-16 glass-card border-b border-x-0 border-t-0 flex items-center justify-between px-6 z-10">
            <button class="lg:hidden text-gray-400 hover:text-white" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <div class="hidden lg:flex items-center gap-2 text-sm text-gray-400">
                <span>Studio</span> <i class="fa-solid fa-chevron-right text-xs"></i> <span class="text-white">Image Generation</span>
            </div>
            <div class="flex items-center gap-4">
                <input type="password" id="apiKey" placeholder="Google Gemini API Key (Optional)" class="hidden md:block bg-black/40 border border-aura-border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-aura-gold/50 text-gray-300 placeholder-gray-600 w-64">
                <button class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 border border-aura-border transition-all">
                    <i class="fa-regular fa-bell text-gray-300"></i>
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth">
            <div class="max-w-6xl mx-auto space-y-8">
                
                <!-- Generator UI -->
                <section class="glass-card rounded-2xl p-6 relative overflow-hidden">
                    <!-- Decorative glow -->
                    <div class="absolute -top-20 -right-20 w-64 h-64 bg-aura-gold/10 rounded-full blur-[80px] pointer-events-none"></div>

                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                        Create <i class="fa-solid fa-wand-magic-sparkles text-aura-gold text-lg"></i>
                    </h2>

                    <!-- Prompt Box -->
                    <div class="relative mb-6">
                        <textarea id="promptInput" rows="3" placeholder="Type your prompt here... (e.g., A futuristic cyberpunk city with neon gold lights, highly detailed, 8k)" class="w-full bg-black/40 border border-aura-border rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-aura-gold/50 focus:border-aura-gold/50 resize-none transition-all"></textarea>
                        <button class="absolute bottom-4 right-4 text-gray-400 hover:text-aura-gold transition-colors">
                            <i class="fa-solid fa-dice"></i>
                        </button>
                    </div>

                    <!-- Controls Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                        
                        <!-- Aspect Ratio -->
                        <div class="col-span-1 md:col-span-3">
                            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Aspect Ratio</label>
                            <div class="relative">
                                <select id="aspectRatio" class="w-full appearance-none bg-black/40 border border-aura-border rounded-lg pl-4 pr-10 py-3 text-sm focus:outline-none focus:border-aura-gold/50 cursor-pointer">
                                    <option value="1:1">1:1 (Square)</option>
                                    <option value="4:5">4:5 (Portrait)</option>
                                    <option value="16:9">16:9 (Landscape)</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none text-xs"></i>
                            </div>
                        </div>

                        <!-- Image Strength (Guidance Scale) -->
                        <div class="col-span-1 md:col-span-6">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Image Strength (Guidance)</label>
                                <span id="strengthValue" class="text-xs text-aura-gold font-mono bg-aura-gold/10 px-2 py-0.5 rounded">15</span>
                            </div>
                            <div class="bg-black/40 border border-aura-border rounded-lg p-3 h-[46px] flex items-center">
                                <input type="range" id="imageStrength" min="1" max="20" value="15" class="w-full">
                            </div>
                        </div>

                        <!-- Generate Button -->
                        <div class="col-span-1 md:col-span-3">
                            <button id="generateBtn" onclick="generateImage()" class="w-full h-[46px] bg-gradient-to-r from-yellow-600 to-aura-gold hover:from-yellow-500 hover:to-yellow-400 text-black font-bold rounded-lg shadow-[0_0_20px_rgba(212,175,55,0.3)] hover:shadow-[0_0_25px_rgba(212,175,55,0.5)] transition-all flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                                <i class="fa-solid fa-bolt"></i> Generate
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Gallery Section -->
                <section>
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold flex items-center gap-2">
                            Recent Generations
                            <span class="bg-white/10 text-xs px-2 py-1 rounded-md text-gray-300" id="imageCount">0</span>
                        </h3>
                        <button onclick="clearGallery()" class="text-sm text-gray-400 hover:text-red-400 transition-colors">
                            <i class="fa-solid fa-trash-can mr-1"></i> Clear History
                        </button>
                    </div>

                    <!-- Gallery Grid -->
                    <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        <!-- Images will be injected here via JS -->
                    </div>
                </section>

            </div>
        </div>
    </main>

    <!-- Full Screen Loader Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-white/10 border-t-aura-gold rounded-full loader mb-4"></div>
        <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-aura-goldLight to-aura-gold animate-pulse">Channeling Aura...</h2>
        <p class="text-gray-400 mt-2 text-sm" id="loadingText">Connecting to Gemini Imagen API</p>
    </div>

    <script>
        // --- State Management ---
        const STORAGE_KEY = 'aura_ai_generations';
        let generations = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // --- DOM Elements ---
        const promptInput = document.getElementById('promptInput');
        const aspectRatio = document.getElementById('aspectRatio');
        const imageStrength = document.getElementById('imageStrength');
        const strengthValue = document.getElementById('strengthValue');
        const apiKeyInput = document.getElementById('apiKey');
        const galleryGrid = document.getElementById('galleryGrid');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const imageCount = document.getElementById('imageCount');

        // --- Event Listeners ---
        imageStrength.addEventListener('input', (e) => {
            strengthValue.textContent = e.target.value;
        });

        // Initialize App
        function init() {
            renderGallery();
        }

        // --- Sidebar Logic ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- Core Generation Logic ---
        async function generateImage() {
            const prompt = promptInput.value.trim();
            const key = "";
            
            if (!prompt) {
                alert("Please enter a prompt to generate an image.");
                promptInput.focus();
                return;
            }

            // Show Loader
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('flex');

            try {
                let imageUrl = '';

                // API ROUTING: If key exists, attempt real Gemini API, otherwise use Fallback Mock
                if (key) {
                    imageUrl = await callGeminiImagenAPI(prompt, key, aspectRatio.value);
                } else {
                    console.warn("No API Key provided. Using simulated generation for UI testing.");
                    imageUrl = await mockGeneration(prompt, aspectRatio.value);
                }

                // Save and Render
                saveGeneration(prompt, imageUrl, aspectRatio.value);
                renderGallery();
                
            } catch (error) {
                console.error("Generation Error:", error);
                alert("Failed to generate image: " + error.message);
            } finally {
                // Hide Loader
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
            }
        }

        /**
         * Connects to Google Gemini API (Imagen 3 endpoint context)
         * Note: Google's Imagen API structure via standard REST.
         */
        async function callGeminiImagenAPI(prompt, apiKey, ratio) {
            // Mapping ratios for the API
            const ratioMap = {
                "1:1": "1:1",
                "4:5": "4:5",
                "16:9": "16:9"
            };

            // Current public endpoint structure for Imagen via Gemini API (v1beta)
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${apiKey}`;

            const payload = {
                instances: [{ prompt: prompt }],
                parameters: {
                    sampleCount: 1,
                    aspectRatio: ratioMap[ratio] || "1:1",
                    outputOptions: { mimeType: "image/jpeg" }
                }
            };

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "API request failed. Check your API key and permissions.");
            }

            const data = await response.json();
            
            // Imagen returns base64 encoded strings in the predictions array
            if (data.predictions && data.predictions.length > 0) {
                const base64Data = data.predictions[0].bytesBase64Encoded;
                return `data:image/jpeg;base64,${base64Data}`;
            } else {
                throw new Error("No image data returned from API.");
            }
        }

        /**
         * Mock Generation for UI/UX testing when API key is missing
         */
        function mockGeneration(prompt, ratio) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    // Calculate dimensions based on ratio for realistic placeholder
                    let w = 1024, h = 1024;
                    if(ratio === '16:9') { w = 1024; h = 576; }
                    if(ratio === '4:5') { w = 819; h = 1024; }
                    
                    // Using an image generation placeholder service (Pollinations.ai is great for text-to-image mocking)
                    const safePrompt = encodeURIComponent(prompt);
                    const mockUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=${w}&height=${h}&nologo=true&seed=${Math.floor(Math.random()*1000)}`;
                    resolve(mockUrl);
                }, 2500); // 2.5s artificial delay for effect
            });
        }

        // --- Local Storage Management ---
        function saveGeneration(prompt, imageUrl, ratio) {
            const newGen = {
                id: Date.now(),
                prompt: prompt,
                url: imageUrl,
                ratio: ratio,
                date: new Date().toLocaleDateString()
            };

            // Add to beginning of array
            generations.unshift(newGen);

            // Keep only the last 20 to prevent localStorage quota limits (especially if base64)
            if (generations.length > 20) {
                generations.pop();
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(generations));
        }

        function clearGallery() {
            if(confirm('Are you sure you want to clear your local image history?')) {
                generations = [];
                localStorage.removeItem(STORAGE_KEY);
                renderGallery();
            }
        }

        // --- UI Rendering ---
        function renderGallery() {
            galleryGrid.innerHTML = '';
            imageCount.textContent = generations.length;

            if (generations.length === 0) {
                galleryGrid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-12 text-gray-500 glass-card rounded-2xl border-dashed border-2 border-white/10">
                        <i class="fa-regular fa-image text-4xl mb-3 opacity-50"></i>
                        <p>No generations yet. Create your first masterpiece above!</p>
                    </div>
                `;
                return;
            }

            generations.forEach(gen => {
                // Adjust card aspect ratio visually
                let aspectClass = "aspect-square";
                if(gen.ratio === '16:9') aspectClass = "aspect-video";
                if(gen.ratio === '4:5') aspectClass = "aspect-[4/5]";

                const card = document.createElement('div');
                card.className = `glass-card rounded-xl overflow-hidden group relative hover:border-aura-gold/50 transition-colors cursor-pointer flex flex-col`;
                
                card.innerHTML = `
                    <div class="w-full ${aspectClass} overflow-hidden bg-black/50 relative">
                        <img src="${gen.url}" alt="${gen.prompt}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500 loading="lazy"">
                        
                        <!-- Hover Overlay -->
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                            <div class="flex items-center justify-between gap-2">
                                <a href="${gen.url}" download="AuraAI_${gen.id}.jpg" class="w-8 h-8 rounded-full bg-aura-gold text-black flex items-center justify-center hover:bg-yellow-400 transition-colors" title="Download">
                                    <i class="fa-solid fa-download text-sm"></i>
                                </a>
                                <span class="bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm border border-white/10">${gen.ratio}</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between gap-2 bg-black/20">
                        <p class="text-sm text-gray-300 line-clamp-2" title="${gen.prompt}">"${gen.prompt}"</p>
                        <p class="text-xs text-aura-gold/70 text-right">${gen.date}</p>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Run on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
